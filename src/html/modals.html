<div class="modal fade" id="courseRegModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Регистрация на курс</h3>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="courseRegForm" data-validate="true">
          <input type="hidden" id="courseRegCourseName" name="course_name" />
          <div class="mb-3">
            <label class="form-label">Имя</label>
            <input type="text" class="form-control" name="name" placeholder="Иван" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Телефон</label>
            <input type="tel" class="form-control" name="phone" placeholder="+7 (999) 123-45-67" required />
          </div>
          <button type="submit" class="btn btn-primary w-100">Забронировать место</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="consultationModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Оставьте свои контакты</h3>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="consultationForm" data-validate="true">
          <div class="mb-3">
            <label class="form-label">Имя</label>
            <input type="text" class="form-control" placeholder="Ваше имя" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Телефон</label>
            <input type="tel" class="form-control" placeholder="+7 (999) 123-45-67" required />
          </div>
          <button type="submit" class="btn btn-primary w-100">Заказать звонок</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal cookie-modal" id="cookieModal" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">
      <button type="button" class="btn-close cookie-close" id="closeCookies"></button>
      <div class="modal-body text-center">
        <p class="text-muted small m-0">
          <span class="cookie-icon me-2">🍪</span>
          Мы используем cookies. Продолжая использовать сайт, вы соглашаетесь с
          <a href="/terms.html">политикой конфиденциальности</a>.
        </p>
      </div>
    </div>
  </div>
</div>

<div class="scroll-cta" id="scrollCta">
  <div class="scroll-cta-content">
    <button class="scroll-cta-close" id="scrollCtaClose"><i class="fas fa-times"></i></button>
    <p class="mb-2">Нужна помощь с выбором?</p>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#consultationModal">
      Консультация
    </button>
  </div>
</div>
</div>
